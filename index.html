<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 1. 基础视觉组件 (最顶层，确保 App 可调用) ---

        function Icon({ name, className = "w-6 h-6" }) {
            const paths = {
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                Zap: <path d="M13 2 L3 14h9l-1 8 10-12h-9l1-8z" />,
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                Eye: <g><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></g>,
                Anchor: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                Book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20v18H6.5a2.5 2.5 0 0 1 0-5H20"/>,
                Wand: <path d="m15 4 5 5M2 20l5-5M12 2l2 2M20 12l2 2M10 10l2 2"/>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Check: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || null}
                </svg>
            );
        }

        function QRCodeGenerator() {
            const qrRef = useRef(null);
            useEffect(() => {
                if (qrRef.current && typeof QRCode !== 'undefined') {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, {
                        text: window.location.href,
                        width: 80,
                        height: 80,
                        colorDark: "#818cf8",
                        colorLight: "#ffffff00",
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
            }, []);
            return <div ref={qrRef} className="p-1 bg-white/10 rounded-lg shadow-xl"></div>;
        }

        function StarField() {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                const stars = Array.from({ length: 140 }, () => ({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 1.5, speed: Math.random() * 0.12 + 0.05 }));
                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); s.y -= s.speed; if (s.y < 0) s.y = canvas.height; });
                    frameId = requestAnimationFrame(draw);
                };
                window.addEventListener('resize', resize); resize(); draw();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(frameId); };
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0" />;
        }

        function SacredLotusPoint({ color, cx, cy, name }) {
            return (
                <g transform={`translate(${cx}, ${cy})`}>
                    <circle r="10" fill={color} opacity="0.4" className="animate-pulse" />
                    <circle r="3" fill="white" />
                    <text x="35" y="7" className="chakra-tag-text">{name}</text>
                </g>
            );
        }

        function MeditatingFigureSVG() {
            const chakraColors = ["#EF4444", "#F97316", "#FACC15", "#22C55E", "#3B82F6", "#6366F1", "#A855F7"];
            const chakraNames = ["海底轮", "生殖轮", "太阳神经丛", "心轮", "喉轮", "眉心轮", "顶轮"];
            return (
                <svg viewBox="0 0 240 300" className="w-full h-auto max-w-[340px]">
                    <defs>
                        <radialGradient id="auraGlowMain" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stopColor="rgba(129, 140, 248, 0.4)" />
                            <stop offset="100%" stopColor="transparent" />
                        </radialGradient>
                    </defs>
                    <circle cx="120" cy="150" r="100" fill="url(#auraGlowMain)" className="animate-pulse-glow" />
                    <path d="M120,45 C132,45 142,55 142,67 C142,79 132,89 120,89 C108,89 98,79 98,67 C98,55 108,45 120,45 M120,89 C102,89 85,100 80,120 C75,140 80,170 92,180 C80,187 55,200 50,225 C45,255 70,265 120,265 C170,265 195,255 190,225 C185,200 160,187 148,180 C160,170 165,140 160,120 C155,100 138,89 120,89 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" strokeWidth="2" />
                    <g>
                        {chakraNames.map((n, i) => (
                            <SacredLotusPoint key={n} cx={120} cy={250 - i * 30} color={chakraColors[i]} name={n} />
                        ))}
                    </g>
                </svg>
            );
        }

        // --- 2. 核心数据 (16 种差异化原型) ---

        const CHAKRA_NAMES = ["海底轮", "生殖轮", "太阳神经丛", "心轮", "喉轮", "眉心轮", "顶轮"];

        // 16 组完全差异化的内容库 (大白话版本)
        const ARCHETYPES = [
            { n: "涅槃紫金", c: "#A855F7", l: "高频觉醒者",
                a: "你最近是不是总觉得自己“心很累”？扫描显示你的能量场正在经历一场深度的“断舍离”。你可能发现自己开始厌倦那些虚伪的聚会，甚至在热闹中感到莫名的孤独。这不是变内向了，而是你的精神频率正在进行自动筛选，不再愿意把生命浪费在无意义的社交中。\n\n从根源上看，你正处于一种“精神主权”的回归期。过去你可能总是习惯性地照顾他人的情绪，或者为了合群而压抑自己的想法，导致内在严重透支。现在的疲惫感其实是身体在发出信号，强迫你把关注点从外部撤回来。你正在学会如何拒绝那些不合理的索取。\n\n接下来的日子，请给生活做一次彻底的“减法”。不要害怕错过机会，也不要担心被冷落。当你不再试图讨好世界，当你回归到安然自在的状态时，真正适合你的资源和关系反而会像磁铁一样向你汇聚。你要相信，清醒后的你，比任何时候都更有力量。",
                m: "你这一生的使命，其实是做一个“人间清醒”的示范。你不需要去做什么惊天动地的事，只需真实、通透地活着，这本身就在给周围的人提供巨大的情绪支持。你天生带有看破迷雾的能力，在喧嚣的世界里，你就是那盏能帮人指引方向的灯。你的真实就是你最大的武器。",
                s: "学会“心安理得地虚度时光”。不要因为没有产出而焦虑。目前的你，静坐、呼吸、发呆产生的能量，远比忙碌奔波要多。建议近期进行一次深度的“信息斋戒”，远离手机。当你不再“用力”生活时，生活才会真正对你温柔。信任这种自然的节奏。你已经是光，只需允许自己照耀。"
            },
            { n: "极光翡翠", c: "#22C55E", l: "温和疗愈师",
                a: "这一抹翡翠绿预示着你进入了一个强效的“情感修复期”。你最近是不是很容易被小事感动？甚至看个电影都会流泪。这并非多愁善感，而是你内心那道长期封闭的门正在开启。你在清理那些连你自己都快忘记的旧伤口，这个过程虽然有点酸楚，但非常必要。\n\n根源显示，你终于开始学会“原谅”了。不仅是原谅别人，更重要的是原谅那个“不够完美”的自己。过去你可能总是对自己太苛刻。现在的能量转变正在软化这种僵硬，让你学会了在柔软中建立力量。你开始意识到，所有的冲突其实是因为频率不合，你不再想争对错，只想寻找共鸣。\n\n未来建议你多去接触大自然，靠近水的地方或森林。你的身体细胞正在这种频率下进行“去毒化”。你会发现周围的人对你变得温柔了，那是你投射出去的信号已经从“防御”变为了“接纳”。请享受这种润物细无声的改变，它正为你吸引来真正的“灵魂伙伴”。",
                m: "你的核心使命是做一个“心灵的园丁”。你拥有那种不需要说话，只要待在一个人身边就能安抚对方的天赋。你被派来修复那些断裂的连接，教导人们如何用真诚去沟通。在这个冷冰冰的效率时代，你的温柔就是最稀缺、最强大的力量，能让荒漠开出花来。",
                s: "园丁也需要自己的秘密花园。源头提醒你：‘先爱自己，慈悲才会溢出’。你太容易吸附他人的情绪垃圾，甚至在不经意间消耗了自己。目前的建议是学会建立‘光的保护盾’。在疗愈他人之前，确保根部深埋在自爱的沃土中。不要抗拒你的敏感。多去户外，让泥土带走负荷。你是安全的。"
            },
            { n: "深海蔚蓝", c: "#3B82F6", l: "智慧领航员",
                a: "蔚蓝光的显现代表你已经进入了“智慧的沉淀期”。你最近越来越厌倦毫无营养的闲聊。这不是因为变无趣了，而是灵魂在追求更真实的交流。你正处于一个“去伪存真”的过程，你的直觉在强迫你剥离掉生活中那些虚假的客套。这种力量会让你的判断力变得极其锐利。\n\n这种心理动态是：你正从“求关注”转向“求真相”。你不再执着于别人的理解，你开始意识到，真正的力量往往藏在沉默和有分量的决策中。你正在学习如何将你庞大的内心感受，转化为清晰、有分量的行动。这个过程就像要把深海的水提炼成甘露，虽然辛苦，但一旦出口，必有回响。\n\n建议近期练习“深度倾听”。不要急于给出建议，只是作为一面镜子去接纳对方发出的信号。你会发现，当你不再急于“输出”时，真正解决问题的智慧会自动流入。可以开始写写东西，无论是日记还是涂鸦。你会发现，当你回归静谧，整个世界都会变得有序。信任你的这种直感。",

                s: "目前的指引在于言语的“提纯”。当你说得越少，你的每一句话就越重。练习深度倾听，听取风的声音和内心的细语。在接下来的周期里，不要急于发表观点或自证，先让智慧在内心沉淀。当你的内在完全澄清时，你的声音将拥有穿透时空、引发觉醒的力量。记住，最伟大的教导往往是在沉默中完成的。"
            },
            { n: "日冕纯金", c: "#FACC15", l: "梦想显化者",
                a: "你最近是不是感到一股强烈的“想搞钱”或“想成事”的冲动？这股纯金色的光芒代表你进入了“绝对行动期”。你已经受够了犹豫不决，你的意志力正处于巅峰。这种能量正在帮你清除那些所谓的“自我怀疑”。你开始意识到，只要你决定了，全世界都会为你让路。\n\n根源显示你正处于“个人权力”的觉醒中。过去你可能总是把决策权交给命运或他人。现在的频率在强迫你拿回主导权。你不再向外寻求认同，因为你已经成为了认同本身。这种能量会像黑洞一样吸引资源向你汇聚。这不仅仅是成功，更是对“富足”这种自然规律的深度理解与运用。\n\n接下来的建议是：大胆去谈、去拿、去创造。不要担心步子迈得太大。你的频率现在非常有感染力，能点燃周围人的动力。唯一要注意的是，不要因为跑得太快而忽视了身后的风景。在显化的同时，保持一份对万物的感恩，这会让你的金子不仅仅是钱财，更是流动的神圣能量。你是天生的领航员。",
                m: "你这一生的核心代码是“神圣建筑师”。你的使命是将那缥缈的灵光精准地锚定在物质界，转化为可见、可感的实体。你向世人示范：当一个人对齐源头意志时，物质世界的繁荣只是能量流动的必然。你正在创造一个让更多灵魂能够安居乐业的神圣场域，示范真正的富足。",
                s: "越是明亮的太阳，阴影也越深。在极速扩张中，务必保持极致的觉察。练习“无为而治”的艺术：行动时像猎豹，静止时像山岳。近期多进行能量上的慷慨练习。当你成为一个纯粹的流转通道，而非囤积者时，宇宙的丰盛会翻倍回馈。信任你的慷慨，那是你最大的底气。你是大地的宠儿。"
            },
            { n: "流金琥珀", c: "#F97316", l: "生命点火者",
                a: "扫描显示你的创造力正在疯狂爆发。你最近是不是有很多古怪的想法？琥珀色的光代表你的“生命之火”被点燃了。你已经厌倦了按部就班，正在寻找一种能让你燃烧的热爱。这种频率正在打破你潜意识里的保守。你不再等待机会，你正在亲手创造机会，每一个灵感都在变得具象。\n\n成因分析显示你正经历从“顺从”到“突破”的质变。过去你可能总是顾虑太多规则。现在的频率让你意识到，规则是为了被打破而存在的。你在心理层面正在经历一次“主权”觉醒，你意识到如果自己不去开辟道路，就永远只能在别人的地盘徘徊。这种火焰是神圣的热情，正在重塑你的性格底色。\n\n建议近期进行一些手工或身体创作。捏陶、绘画、跳舞，任何让肉体参与其中的创造都能极大地稳固这股能量。不要担心别人怎么看你。你的喜悦是最好的吸引力法则。你会发现当你完全投入到某件事时，时间是静止的。请尽情燃烧，这种光亮能照亮很多在黑暗中摸索的同路人。你是火种。",
                m: "你的核心代码是“热情的传递者”。天赋在于通过你的喜悦，去唤醒他人内心沉睡已久的动力。你被委派去打破陈旧、死气沉沉的教条。通过你的存在，你正在教导人们：灵性并不意味着枯坐，它也可以是热气腾腾的表达。你将建立一种鼓励自由的文化，让每个人都拨亮内心的火。",

                            <div className="flex items-center justify-between gap-10 px-8 py-10 border-t border-white/10 bg-white/[0.02]">
                                <div className="text-left space-y-3">
                                    <p className="text-lg font-black tracking-widest text-white">扫码解码能量</p>
                                    <p className="text-xs text-slate-500 italic">开启你的 2026 觉醒之旅</p>
                                </div>
                                <QRCodeGenerator />
                            </div>
                        </div>
                    )}

                    {/* Share Modal */}
                    {showShareModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-in">
                            <div className="absolute inset-0 bg-black/98 backdrop-blur-3xl" onClick={() => { setShowShareModal(false); setPosterUrl(''); }} />
                            <div className="relative w-full max-w-sm flex flex-col items-center">
                                <button onClick={() => { setShowShareModal(false); setPosterUrl(''); }} className="absolute -top-14 right-0 p-4 bg-white/10 rounded-full text-white border border-white/20 shadow-2xl z-[110] flex items-center justify-center"><Icon name="X" className="w-8 h-8" /></button>
                                {posterUrl ? (
                                    <div className="w-full flex flex-col items-center animate-in">
                                        <img src={posterUrl} className="w-full rounded-[3rem] shadow-2xl border border-white/20" alt="宇宙能量海报" />
                                        <div className="mt-10 px-10 py-4 bg-indigo-500/30 border border-indigo-500/40 rounded-full animate-pulse shadow-xl">
                                            <p className="text-indigo-100 text-base font-black tracking-widest">长按图片保存并分享</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="py-32 text-center">
                                        <div className="w-16 h-16 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin mx-auto mb-8" />
                                        <p className="text-indigo-300 animate-pulse font-bold tracking-widest">正在生成神圣海报...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        if (container) {
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }
    </script>
</body>
</html>
