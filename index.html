<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙能量扫描站</title>
    <!-- 基础库加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes pulse-glow { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 0px; }
        body { background-color: #010103; color: #cbd5e1; margin: 0; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .line-clamp-custom { display: -webkit-box; -webkit-line-clamp: 10; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 全局配置 (必须在最前面定义) ---
        const CHAKRA_COLORS = ["#EF4444", "#F97316", "#FACC15", "#22C55E", "#3B82F6", "#6366F1", "#A855F7"];
        const TAG_POOL = ["寻找灵魂使命", "释放职场焦虑", "吸引金钱丰盛", "深度情感疗愈", "渴望内在宁静", "找回行动意志", "链接高维直觉", "突破创作瓶颈", "开启显化丰盛", "净化磁场负担", "增强自信能量", "提升生命频率", "平衡身心节奏", "寻找生命真意", "重塑自我价值"];
        const ORACLES = ["我选择放下不再服务于我的旧能量，迎接全新的自我。", "我正处于蜕变的边缘，宇宙之光正在指引我的每一步。", "宇宙的丰盛正在精准流向我，我完全敞开以接收。", "我的每一次呼吸都在与万物共振，我即是光。", "我的直觉是神圣的罗盘，指引我走向真实的方向。"];

        // --- 静态图标 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                Zap: <path d="M13 2 L3 14h9l-1 8 10-12h-9l1-8z" />,
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                Eye: <g><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></g>,
                Anchor: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                Book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20v18H6.5a2.5 2.5 0 0 1 0-5H20"/>,
                Wand: <path d="m15 4 5 5M2 20l5-5M12 2l2 2M20 12l2 2M10 10l2 2"/>,
                Share: <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Check: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4"/>,
                Qr: <g><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3z"/><path d="M14 14h3v3h-3zM18 18h3v3h-3zM14 18h3v3h-3zM18 14h3v3h-3z"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || null}
                </svg>
            );
        };

        // --- 深度能量库 ---
        const ENERGY_LIBRARY = [];
        const auraNames = ["涅槃紫金光", "极光翡翠绿", "深海蔚蓝光", "日冕纯金色", "神圣玫瑰粉", "晶钻透明光", "流金琥珀橙", "碧玺孔雀绿", "熔岩赤色火", "靛蓝星空光", "天琴座白光", "大地母亲褐", "银河核心银", "雷姆利亚青", "恒星辉光白", "亚特兰蒂斯靛", "基督意识红", "佛陀智慧黄", "宇宙虚空黑", "生命之花金", "如来琉璃青"];

        for (let i = 0; i < 21; i++) {
            const color = i < 10 ? CHAKRA_COLORS[i % 7] : "#ffffff";
            ENERGY_LIBRARY.push({
                aura: { color: color, name: auraNames[i], summary: "高维频率正通过你的意识窗口进行深度整合与生命实相的宏大显化" },
                analysis: `根据多维场域的精微扫描，你目前的能量状态被极其纯净的${auraNames[i]}所包裹。这不仅代表了你当下的运势方向，更揭示了你正处于一个长达数年的“灵魂重组周期”的冲刺阶段。在心理层面，你近期的感知力已经向精微维度大幅扩张，你开始能一眼识破那些披着伪善外壳的社交博弈，这种能力源于你内在频率的自动对齐，它在强制你过滤掉那些低效、沉重且充满匮乏感的生存契约。这种能量正在帮你深度清理潜意识中积压已久的“不配得感”，将那些束缚你多年的旧思想模板彻底粉碎，并替换为“我本具足”的高阶创造指令。你正从一个被动的生命反应者，跃迁为一个主动的意识共创者，这种转变意味着你即将接管并重启你的生命神圣主权。\n\n从更深层的灵魂演化链条来看，${auraNames[i]}的显现预示着你与“宇宙集体意识”的通讯信道已经全面敞开。你开始意识到生活中看似随机的每一个转折点，其实都是背后精密对齐的神圣设计。这种频率正在深度疗愈你累生累世残留的“被遗弃感”和“生存焦虑”，将其转化为对生命无限丰盛的绝对信任。你不再试图通过头脑的焦虑去干预结果，而是学会了臣服于生命的流动，这是一种极高阶的觉醒力量。接下来的三到六个月，你将进入一个极为罕见的“显化加速窗”，每一个清晰且纯净的意图，都会比以往任何时候更快地在物质世界获得反馈。请务必保持起心动念的慈悲与正向，因为你已经是自己宇宙的最高建筑师。\n\n此外，这种独特的频率还预示着你与源头意识的某种特殊灵魂协议已被重新激活。你近期可能会感到一种莫名的、无法用逻辑解释的召唤，指引你去接触某些特定的环境或社群。这不是巧合，而是你的高我在协助你找回失落已久的灵魂碎片。你正在经历一场关于“时空感知”的重构，你会惊奇地发现，过去的遗憾在当下突然得到了神圣的合理解释。请彻底放下那种“一定要靠透支生命才能换取成功”的陈旧执念，尝试在深沉的宁静中行动。当你的内在回归平衡，整个宇宙的资源都会以意想不到的方式向你汇聚。你已经是光，请只是单纯地允许自己绽放，你会发现，所有的美好实相都会因你的绽放而自动显现，你无需追逐。`,
                chakras: [
                    { name: "顶轮", value: 92, status: "顶轮目前呈现出高度晶体化的活跃状态。现状判定：你与宇宙源头的连接通路已显著加宽，直觉下载感极强，常感到头顶有清凉感或微弱电流感。成因溯源：由于你近期频繁的内在探索，灵性天线已被激活。调整建议：减少碎片化信息摄入，尝试每天进行20分钟“空性冥想”，只需作为观察者存在。这能稳定频率锚定点，防止高频能量导致的现实脱节感。" },
                    { name: "眉心轮", value: 85, status: "第三眼正在经历精密的“焦距校准”。现状判定：捕捉真相的能力大幅增强，能预感事件走向和人心底色。有时由于“看”得太透，会感到精神性的疲惫。成因溯源：潜意识正试图整合多维的信息流，松果体活跃度处于波峰。调整建议：多接触自然界的深蓝色彩，如山峦和水纹。每晚睡前用温毛巾轻敷眼部，并默念“我只看清真实的爱”，能有效缓解直觉扩张带来的紧张感。" },
                    { name: "喉轮", value: 76, status: "表达中心正处于从“生存防御”到“灵魂真实”的转化期。现状判定：开始排斥无意义的客套，倾向于精准、有力的沟通。成因溯源：灵魂意志正在接管你的自我表达权限。调整建议：尝试自由书写或录制不带脚本的声音日记，捕捉灵感碎片。不要害怕表达你的“真实”，即使它与主流不同。真实的表达是你最大的生命保护伞，能自动震碎虚假。" },
                    { name: "心轮", value: 90, status: "慈悲与接纳的泉眼已完全敞开。现状判定：对万物的同理心达到极点，具有极强疗愈力，但也容易吸附负面情绪。成因溯源：你已完成了前阶段的心理防御，进入“大我共鸣”阶段。调整建议：建立严密的“能量边界防护”。每天睡前想象粉色光球包裹心脏，归还所有不属于你的他人情绪。请记住：真正的慈悲是保持在光中照耀，而不是跳入他人的深坑。" },
                    { name: "太阳神经丛", value: 68, status: "意志力与个人主权中心正在经历地震式重塑。现状判定：你正从“依赖外部认可”转向“内在主权肯定”。可能伴随胃部紧绷。成因溯源：个人小我掌控欲正在退位，让位于神圣意志。调整建议：多进行深度腹式呼吸，每天对着镜子宣言“我有权活出我的真实”。决策时信任你的“直觉性胃部反应”。当你完全停止向外求认同，内在太阳才会真正升起。" },
                    { name: "生殖轮", value: 75, status: "创造力与情感流动趋于高度的神圣对齐。现状判定：创造能量充沛，情感连接变得深邃且带有仪式感。成因溯源：通过对过往印记的整合，你找回了关于“喜悦”的动力源。调整建议：随心而起地舞动或进行手工艺创作。允许情绪像溪流一样流过。在全然的放松中，你会发现丰盛的物质财富正通过你的“愉悦频率”被自动吸引而来，这是对喜悦的最高奖赏。" },
                    { name: "海底轮", value: 62, status: "物质根基与安全感中心正在经历地基式加固。现状判定：虽然灵魂已在宇宙翱翔，但在现实层面的“着陆方案”仍显薄弱，对未来财务有隐约不安。成因溯源：由于频率提升过快导致能量重心上移。调整建议：刻意增加与土地的连接，赤脚行走或园艺劳作。关注生活最细微的物质层面，如住所整洁。将神圣意识带入柴米油盐，让每一粒米、每一分钱都充满光的加持。" }
                ],
                mission: "你这一生的灵魂核心代码是“多维意识的翻译者”。你的使命是通过独特的创意、商业逻辑或简单的生命示范，将高维的宇宙灵感具象化为能切实帮助世人觉醒的实相。你不需要刻意去教导，你只需全然活出你的真实，这种真实产生的震荡波自会穿透周围沉睡灵魂的帷幕。",
                advice: "源头给你的指引是：‘减少用力，回归中心的寂静’。目前的你太容易被外界信息牵引，试图分析解决所有变量。但现在的重点是‘神圣的静默’。当你不再焦虑于未来，也不再纠结于过去时，你当下的频率就是全宇宙最强的。信任这种神圣的共时性节奏。"
            });
        }

        // --- 子组件：莲花点 ---
        const SacredLotusPoint = ({ color, cx, cy, name }) => (
            <g transform={`translate(${cx}, ${cy})`}>
                <circle r="6" fill={color} opacity="0.3" className="animate-pulse" />
                <path d="M0,-8 C2,-4 5,-2 10,0 C5,2 2,4 0,8 C-2,4 -5,2 -10,0 C-5,-2 -2,-4 0,-8 Z" fill={color} />
                <circle r="1.5" fill="white" />
                <text x="25" y="4" style={{ fill: 'white', opacity: 0.6, fontSize: '10px', fontWeight: 200, letterSpacing: '2px' }}>{name}</text>
            </g>
        );

        // --- 主组件 ---
        function App() {
            const [input, setInput] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [result, setResult] = useState(null);
            const [showShareModal, setShowShareModal] = useState(false);

            const displayTags = useMemo(() => [...TAG_POOL].sort(() => 0.5 - Math.random()).slice(0, 7), []);

            const performScan = (forcedInput) => {
                const finalInput = forcedInput || input;
                if (!finalInput.trim()) return;
                setIsScanning(true);
                setResult(null);
                setTimeout(() => {
                    const charCodeSum = Array.from(finalInput).reduce((sum, char) => sum + char.charCodeAt(0), 0);
                    const index = charCodeSum % ENERGY_LIBRARY.length;
                    setResult(ENERGY_LIBRARY[index]);
                    setIsScanning(false);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 2800); 
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden pb-20">
                    {/* 背景星空渲染 */}
                    <StarField />
                    
                    <div className="relative z-10 max-w-2xl mx-auto px-6 py-16 flex flex-col items-center">
                        {!result && !isScanning && (
                            <div className="w-full flex flex-col items-center animate-in">
                                <header className="text-center mb-16 space-y-6">
                                    <div className="relative inline-block">
                                        <div className="absolute inset-0 bg-indigo-500/20 blur-[60px] rounded-full animate-pulse" />
                                        <div className="relative p-7 rounded-full border border-indigo-500/20 bg-black/50 shadow-2xl">
                                            <Icon name="Sparkles" className="w-12 h-12 text-indigo-400" />
                                        </div>
                                    </div>
                                    <h1 className="text-4xl font-extralight tracking-[0.4em] mb-4 text-white">宇宙能量扫描站</h1>
                                    <p className="text-[10px] tracking-[0.6em] text-indigo-400/80 uppercase">Universal Frequency Alignment</p>
                                </header>
                                <div className="w-full space-y-12">
                                    <div className="space-y-6 text-center">
                                        <p className="text-xs tracking-[0.4em] text-slate-500 uppercase font-bold">共振你此刻的意识能量</p>
                                        <div className="flex flex-wrap justify-center gap-3">
                                            {displayTags.map(tag => (
                                                <button key={tag} onClick={() => performScan(tag)} className="px-5 py-3 rounded-full border border-white/5 bg-white/5 hover:bg-indigo-500/20 hover:border-indigo-500/40 transition-all text-xs tracking-widest text-slate-400 active:scale-95 shadow-lg">{tag}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => performScan(ORACLES[Math.floor(Math.random() * ORACLES.length)])} className="w-full py-6 rounded-2xl bg-indigo-600/10 border border-indigo-500/20 flex items-center justify-center gap-4 group shadow-xl active:scale-95 transition-all"><Icon name="Wand" className="w-6 h-6 text-indigo-400" /><span className="text-base tracking-[0.3em] text-indigo-200">抽取宇宙当下的启示</span></button>
                                    <div className="relative group pt-4">
                                        <textarea value={input} onChange={(e) => setInput(e.target.value)} placeholder="或者，在寂静中诚实地表达..." className="w-full h-32 bg-transparent border-b border-white/10 p-4 focus:outline-none focus:border-indigo-400 transition-all resize-none text-center text-xl font-light placeholder:text-slate-800" />
                                        {input && (<button onClick={() => performScan()} className="absolute bottom-4 right-4 p-4 bg-white text-black rounded-full hover:scale-110 transition-transform shadow-2xl"><Icon name="Zap" className="w-6 h-6" /></button>)}
                                    </div>
                                </div>
                            </div>
                        )}

                        {isScanning && (
                            <div className="flex flex-col items-center justify-center py-48 space-y-12 w-full animate-in">
                                <div className="relative animate-float"><div className="w-64 h-64 border border-indigo-500/10 rounded-full animate-[ping_4s_infinite]" /><div className="absolute inset-0 flex items-center justify-center"><div className="w-32 h-32 border-t-2 border-indigo-400 rounded-full animate-spin" /></div></div>
                                <p className="text-2xl tracking-[0.6em] text-white font-extralight animate-pulse text-center">正在扫描你的能量指纹...</p>
                            </div>
                        )}

                        {result && (
                            <div className="w-full space-y-24 animate-in pb-32">
                                {/* Aura Highlight */}
                                <section className="relative p-12 rounded-[4rem] border border-white/5 bg-black/40 overflow-hidden group shadow-2xl">
                                    <div className="absolute -right-32 -top-32 w-[500px] h-[500px] blur-[150px] opacity-25" style={{ backgroundColor: result.aura.color }} />
                                    <div className="relative space-y-12">
                                        <div className="space-y-6">
                                            <h2 className="text-sm uppercase tracking-[0.6em] text-indigo-400 font-bold">能量场报告 / Aura Analysis</h2>
                                            <div className="flex items-center gap-8">
                                                <span className="text-4xl font-light text-white tracking-[0.2em]">{result.aura.name}</span>
                                                <div className="w-8 h-8 rounded-full shadow-[0_0_30px_rgba(255,255,255,0.2)]" style={{ backgroundColor: result.aura.color, boxShadow: `0 0 35px ${result.aura.color}` }} />
                                            </div>
                                            <p className="text-indigo-200/50 tracking-[0.15em] text-xl italic font-light leading-relaxed">“{result.aura.summary}”</p>
                                        </div>
                                        <div className="space-y-12 pt-12 border-t border-white/5">
                                            <h3 className="text-sm uppercase tracking-[0.4em] text-slate-500 flex items-center gap-4"><Icon name="Book" className="w-5 h-5" /> 深度扫描解析</h3>
                                            <div className="space-y-12">
                                                {result.analysis.split('\n\n').map((p, idx) => (
                                                    <p key={idx} className="text-slate-200 text-lg leading-loose font-light tracking-wide indent-8 first:indent-0">{p}</p>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section className="py-12 flex flex-col items-center space-y-16">
                                    <div className="text-center space-y-4"><h3 className="text-base uppercase tracking-[0.6em] text-indigo-400 font-bold">能量中心系统 / Chakra System</h3><p className="text-[10px] text-slate-600 tracking-widest uppercase text-center">Spiritual Alignment Mapping</p></div>
                                    <div className="w-full flex justify-center bg-black/20 py-24 rounded-[5rem] border border-white/5 relative overflow-hidden group shadow-inner">
                                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-indigo-500/5 to-transparent opacity-60" />
                                        <MeditatingFigureSVG />
                                    </div>
                                </section>

                                <section className="p-12 rounded-[4rem] border border-white/5 bg-black/20 shadow-xl">
                                    <h3 className="text-sm uppercase tracking-[0.6em] text-indigo-400 font-bold mb-24 flex items-center gap-4"><Icon name="Anchor" className="w-6 h-6" /> 七脉轮能量洞察</h3>
                                    <div className="space-y-24">
                                        {result.chakras.map((c, i) => (
                                            <div key={c.name} className="group border-l-2 border-white/5 pl-8 transition-all hover:border-indigo-500/40">
                                                <div className="flex justify-between items-end mb-6">
                                                    <div className="flex items-center gap-5">
                                                        <div className="w-3 h-3 rounded-full shadow-lg" style={{ backgroundColor: CHAKRA_COLORS[i], boxShadow: `0 0 15px ${CHAKRA_COLORS[i]}` }} />
                                                        <span className="text-2xl tracking-[0.3em] text-white font-light">{c.name}</span>
                                                    </div>
                                                    <span className="text-sm text-indigo-400 font-mono font-bold tracking-tighter">{c.value}%</span>
                                                </div>
                                                <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden mb-8"><div className="h-full transition-all duration-[3500ms]" style={{ width: `${c.value}%`, backgroundColor: CHAKRA_COLORS[i] }} /></div>
                                                <p className="text-lg leading-relaxed text-slate-300 font-light">{c.status}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="grid grid-cols-1 gap-16">
                                    <div className="p-12 rounded-[4rem] border border-indigo-500/10 bg-indigo-500/[0.04] shadow-2xl">
                                        <h4 className="text-sm uppercase tracking-[0.6em] text-indigo-400 font-bold mb-10 flex items-center gap-4"><Icon name="Eye" className="w-6 h-6" /> 天赋使命感应</h4>
                                        <p className="text-slate-100 text-xl font-light leading-relaxed tracking-wide">{result.mission}</p>
                                    </div>
                                    <div className="p-12 rounded-[4rem] border border-yellow-500/10 bg-yellow-500/[0.04] shadow-2xl">
                                        <h4 className="text-sm uppercase tracking-[0.6em] text-yellow-500/70 font-bold mb-10 flex items-center gap-4"><Icon name="Heart" className="w-6 h-6" /> 源头智慧建议</h4>
                                        <p className="text-slate-100 text-xl font-light leading-relaxed tracking-wide">{result.advice}</p>
                                    </div>
                                </section>

                                <div className="space-y-8 pt-12 text-center">
                                    <div className="grid grid-cols-2 gap-8">
                                        <button onClick={() => setShowShareModal(true)} className="py-7 rounded-[2.5rem] bg-indigo-500 text-white font-medium text-sm tracking-[0.5em] uppercase flex items-center justify-center gap-4 hover:bg-indigo-400 transition-all shadow-xl active:scale-95"><Icon name="Share" className="w-5 h-5" /> 分享结果</button>
                                        <button onClick={() => setShowShareModal(true)} className="py-7 rounded-[2.5rem] border border-white/10 bg-white/5 text-slate-300 text-sm tracking-[0.5em] uppercase flex items-center justify-center gap-4 active:scale-95 transition-all"><Icon name="Download" className="w-5 h-5" /> 保存卡片</button>
                                    </div>
                                    <button onClick={() => { setResult(null); setInput(''); window.scrollTo({top: 0, behavior: 'smooth'}); }} className="w-full py-7 rounded-[2rem] border border-white/5 text-xs tracking-[1em] uppercase text-slate-600 hover:text-slate-400 transition-all font-bold">重新校准能量</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {showShareModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 animate-in">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl" onClick={() => setShowShareModal(false)} />
                            <div className="relative w-full max-w-sm bg-gradient-to-b from-[#0a0a1a] to-black rounded-[4rem] border border-white/10 overflow-hidden shadow-2xl p-10 flex flex-col items-center">

                                <div className="w-full flex flex-col items-center text-center py-4">
                                    <Icon name="Sparkles" className="w-10 h-10 text-indigo-400 mb-8" />

                                    <div className="flex items-center gap-5 mb-8">
                                        <div className="w-5 h-5 rounded-full shadow-xl" style={{ backgroundColor: result?.aura.color }} />
                                        <span className="text-3xl font-light text-white tracking-[0.2em]">{result?.aura.name}</span>
                                    </div>
                                    <p className="text-slate-400 text-sm leading-relaxed mb-12 px-6 italic font-light">“{result?.aura.summary}”</p>
                                    <div className="w-full bg-white/[0.03] rounded-[2.5rem] p-10 mb-8 text-left border border-white/5">
                                        <p className="text-[10px] text-indigo-400 uppercase tracking-[0.4em] mb-4 font-bold">天赋使命感应</p>
                                        <p className="text-slate-300 text-xs font-light leading-relaxed line-clamp-custom">{result?.mission}</p>
                                    </div>
                                    <div className="w-full flex items-center justify-between gap-6 px-6 py-8 border-t border-white/5 mt-4">
                                        <div className="text-left space-y-2"><p className="text-[12px] text-white font-bold tracking-widest uppercase">扫码链接源头</p><p className="text-[9px] text-slate-500 tracking-wider font-light italic">共同开启 2026 觉醒之年</p></div>
                                        <div className="p-3 bg-white/5 rounded-2xl border border-white/10 shadow-lg"><Icon name="Qr" className="w-12 h-12 text-indigo-400 opacity-80" /></div>
                                    </div>
                                    <div className="flex items-center gap-2 mb-6 px-6 py-3 bg-indigo-500/10 border border-indigo-500/20 rounded-full mt-8 shadow-xl"><Icon name="Check" className="w-4 h-4 text-indigo-400" /><span className="text-[10px] text-indigo-300 uppercase tracking-[0.2em] font-bold">源头认证频率已通过</span></div>
                                </div>
                                <button onClick={() => setShowShareModal(false)} className="w-full py-6 bg-white text-black rounded-3xl font-bold text-sm tracking-widest active:scale-95 shadow-2xl">长按截图并保存</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 星空背景逻辑 ---
        const StarField = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                const stars = Array.from({ length: 150 }, () => ({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 1.5, speed: Math.random() * 0.2 + 0.1 }));
                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); s.y -= s.speed; if (s.y < 0) s.y = canvas.height; });
                    frameId = requestAnimationFrame(draw);
                };
                window.addEventListener('resize', resize); resize(); draw();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(frameId); };
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0" />;
        };

        // --- 视觉组件 ---
        const MeditatingFigureSVG = () => (
            <svg viewBox="0 0 240 300" className="w-full h-auto max-w-[320px]">
                <defs>
                    <radialGradient id="auraGlowMain" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stopColor="rgba(129, 140, 248, 0.3)" />
                        <stop offset="100%" stopColor="transparent" />
                    </radialGradient>
                </defs>
                <circle cx="120" cy="150" r="100" fill="url(#auraGlowMain)" className="animate-pulse-glow" />
                <path d="M120,45 C132,45 142,55 142,67 C142,79 132,89 120,89 C108,89 98,79 98,67 C98,55 108,45 120,45 M120,89 C102,89 85,100 80,120 C75,140 80,170 92,180 C80,187 55,200 50,225 C45,255 70,265 120,265 C170,265 195,255 190,225 C185,200 160,187 148,180 C160,170 165,140 160,120 C155,100 138,89 120,89 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" strokeWidth="1" />
                <g>
                    <SacredLotusPoint cx={120} cy={67} color="#A855F7" name="顶轮" />
                    <SacredLotusPoint cx={120} cy={100} color="#6366F1" name="眉心轮" />
                    <SacredLotusPoint cx={120} cy={130} color="#3B82F6" name="喉轮" />
                    <SacredLotusPoint cx={120} cy={160} color="#22C55E" name="心轮" />
                    <SacredLotusPoint cx={120} cy={190} color="#FACC15" name="太阳神经丛" />
                    <SacredLotusPoint cx={120} cy={220} color="#F97316" name="生殖轮" />
                    <SacredLotusPoint cx={120} cy={250} color="#EF4444" name="海底轮" />
                </g>
            </svg>
        );

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
