<!DOCTYPE html>

    <!-- 加载核心库 -->

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @keyframes pulse-glow { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.4; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 0px; }
        body { background-color: #010103; color: #cbd5e1; margin: 0; font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        /* 协调后的精细脉轮标签 */
        .chakra-tag-text { font-size: 13px; fill: #ffffff; font-weight: 500; letter-spacing: 1.5px; opacity: 0.85; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
        .line-clamp-custom { display: -webkit-box; -webkit-line-clamp: 12; -webkit-box-orient: vertical; overflow: hidden; }
        /* 海报截图专用：移出可视区但保持渲染 */
        .poster-canvas-area { position: absolute; left: -9999px; top: 0; width: 375px; background: #010103; z-index: -1; }
        .bg-void { background: radial-gradient(circle at center, #111126 0%, #010103 100%); }
        .text-indent { text-indent: 2em; }
        .principle-box { border: 1px solid rgba(129, 140, 248, 0.15); background: rgba(255, 255, 255, 0.02); }
        .principle-text { font-weight: 300; letter-spacing: 0.8px; line-height: 1.8; color: rgba(224, 231, 255, 0.8); }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 1. 子组件声明 (确保提升) ---

        function Icon({ name, className = "w-6 h-6" }) {
            const paths = {
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,

                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                Eye: <g><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></g>,
                Anchor: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,

                Wand: <path d="m15 4 5 5M2 20l5-5M12 2l2 2M20 12l2 2M10 10l2 2"/>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Check: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || null}
                </svg>
            );
        }

        function QRCodeGenerator({ url }) {
            const qrRef = useRef(null);
            useEffect(() => {
                if (qrRef.current && typeof QRCode !== 'undefined') {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, {
                        text: url || window.location.href,
                        width: 80,
                        height: 80,
                        colorDark: "#818cf8",
                        colorLight: "#ffffff00",
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
            }, [url]);
            return <div ref={qrRef} className="p-1 bg-white/5 rounded-lg border border-white/10"></div>;
        }

        function SacredLotusPoint({ color, cx, cy, name }) {
            return (
                <g transform={`translate(${cx}, ${cy})`}>
                    <circle r="6" fill={color} opacity="0.25" className="animate-pulse" />
                    <circle r="1.5" fill="white" />
                    <text x="22" y="5" className="chakra-tag-text">{name}</text>
                </g>
            );
        }

        function MeditatingFigureSVG() {
            const chakraColors = ["#EF4444", "#F97316", "#FACC15", "#22C55E", "#3B82F6", "#6366F1", "#A855F7"];
            const chakraNames = ["海底轮", "生殖轮", "太阳神经丛", "心轮", "喉轮", "眉心轮", "顶轮"];
            return (
                <svg viewBox="0 0 240 300" className="w-full h-auto max-w-[320px]">
                    <defs>
                        <radialGradient id="auraGlowMain" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stopColor="rgba(129, 140, 248, 0.3)" />

                    <path d="M120,45 C132,45 142,55 142,67 C142,79 132,89 120,89 C108,89 98,79 98,67 C98,55 108,45 120,45 M120,89 C102,89 85,100 80,120 C75,140 80,170 92,180 C80,187 55,200 50,225 C45,255 70,265 120,265 C170,265 195,255 190,225 C185,200 160,187 148,180 C160,170 165,140 160,120 C155,100 138,89 120,89 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" strokeWidth="1" />
                    <g>
                        {chakraNames.map((n, i) => (
                            <SacredLotusPoint key={n} cx={120} cy={250 - i * 30} color={chakraColors[i]} name={n} />
                        ))}

            );
        }

        // --- 2. 文案与算法逻辑 ---

        const CHAKRA_NAMES = ["海底轮", "生殖轮", "太阳神经丛", "心轮", "喉轮", "眉心轮", "顶轮"];
        const CHAKRA_COLORS = ["#EF4444", "#F97316", "#FACC15", "#22C55E", "#3B82F6", "#6366F1", "#A855F7"];
        const TAG_POOL = ["寻找灵魂使命", "释放职场焦虑", "吸引金钱丰盛", "深度情感疗愈", "渴望内在宁静", "找回行动意志", "链接高维直觉", "突破创作瓶颈", "开启显化丰盛", "净化磁场负担", "增强自信能量", "提升生命频率", "平衡身心节奏", "寻找生命真意", "重塑自我价值"];
        const ORACLES = ["我选择放下不再服务于我的旧能量，迎接全新的自我。", "我正处于蜕变的边缘，宇宙之光正在指引我的每一步。", "宇宙的丰盛正在精准流向我，我完全敞开以接收。", "我的每一次呼吸都在与万物共振，我即是光。", "我的直觉是神圣的罗盘，指引我走向真实的方向。"];

        const ARCHETYPE_SEED = [
            { n: "涅槃紫金", c: "#A855F7", l: "高频觉醒者",
                a: "最近你是不是总觉得“心很累”？扫描显示你的场域正经历一场深度的清理。你可能发现自己开始厌倦那些虚伪的聚会和无效的社交，甚至在热闹的人群中感到莫名的疏离。这不是变孤僻，而是你的精神频率正在进行自动提纯，潜意识不再愿意把宝贵的生命能量浪费在这些让你内耗的琐事上。\n\n这种疲惫感的根源，其实是你在找回“精神主权”。过去你可能总是习惯性地去照顾他人的情绪，或者为了合群而不得不压抑自己真正的想法，这导致你内在的蓄电池已经严重透支。现在的信号其实是你的高我在发出警报，强迫你把关注点从外部撤回来，重新放回自己身上。你正在学会如何拒绝那些不再适合你的环境。\n\n接下来的日子，请给生活做一次彻底的“减法”。不要害怕错过什么机会，也不要担心被谁冷落。当你不再试图去讨好这个世界，当你回归到安然自在的状态时，真正适合你的资源、机会和关系反而会像磁铁一样被你吸引。你要相信，一个完全找回自我的你，比任何时候都更有力量。保持你的宁静，那是你最强的防御。",
                m: "你这一生的天赋使命，其实是做一个“人间清醒”的示范者。你不需要去做什么惊天动地的大事，你只需真实、通透地活着，这本身就在给周围的人提供巨大的情绪支持和方向指引。你天生带有一种看破迷雾的能力，能帮迷茫的人指引方向。在喧嚣的世界里，你就是那盏不灭的灯，用你的存在去唤醒周围沉睡的灵魂。",
                s: "源头给你的建议是：学会“神圣的浪费时间”。不要因为没有所谓的产出而感到焦虑。目前的你，静坐、深呼吸、发呆产生的能量价值，远比忙碌奔波要多。建议近期进行一次深度的“信息斋戒”，远离手机，去自然中走走。当你不再通过“用力”去生活时，生活才会真正对你温柔。信任这种自然的节奏，一切都在最好的安排中。"
            },
            { n: "极光翡翠", c: "#22C55E", l: "生命疗愈师",
                a: "翡翠绿的光场预示着你进入了一个强效的“情感修复期”。你最近是不是变得很容易感性？看个路人都能联想到生命的厚重。这并非多愁善感，而是你内心那道长期封闭的门正在缓缓开启。你在清理那些深埋在心底、连你自己都快忘记的旧伤口，这个过程虽然有点酸楚，但对你的生命质量提升至关重要。\n\n这种变化的深层原因在于你学会了“原谅”。不仅是原谅那些曾经伤害过你的人，更重要的是你正在原谅那个“不够完美”的自己。过去你可能对自己太苛刻，总是追求某种极致的掌控。现在的能量转变正在软化这种僵硬，让你在柔软中建立力量。你开始意识到，所有的冲突其实是因为频率不合，你不再想争论对错，只想寻找灵魂的共鸣。\n\n未来的周期里，建议你多去接触大自然，尤其是靠近水的地方或森林。你的身体细胞正在这种频率下进行快速的修复。你会发现周围的人对你的态度变得温柔了，那是你投射出去的信号已经变为了接纳而非防御。请享受这种润物细无声的改变，它正为你吸引来真正的“灵魂家族”。请完全沉浸在这股绿色的光中。",
                m: "你的核心使命是做一个“心灵的园丁”。你拥有那种不需要说话，只要待在一个人身边就能安抚对方焦虑的天赋。你被委派来修复那些断裂的关系连接，教导人们如何用真诚而非套路去沟通。在这个冷冰冰的效率时代，你的温柔就是最稀缺、最强大的武器，能让荒漠开出温暖的灵魂之花。",
                s: "园丁也需要属于自己的秘密花园。源头提醒你：‘先爱自己，慈悲才会真正溢出’。你太容易吸附他人的情绪垃圾，甚至在不经意间透支了自己。目前的建议是学会建立‘光的保护盾’。在疗愈他人之前，确保你的根部是深埋在自爱的沃土中的。多去户外，让泥土带走你的负荷。保护好你的敏感心。"
            },
            { n: "深海蔚蓝", c: "#3B82F6", l: "智慧智领者",
                a: "蔚蓝光的显现代表你已经进入了“智慧的沉淀期”。你最近是不是发现自己越来越厌倦那些毫无营养的闲聊？这不是变无趣了，而是你的灵魂在追求更深刻、更真实的交流。你正处于一个“去伪存真”的过程，你的直觉在强迫你剥离掉生活中那些虚假的客套和伪装。这种力量会让你的判断力变得极其锐利，一眼看穿事情的本质。\n\n这种状态的心理动态是：你正从“求关注”转向“求真相”。你不再执着于别人的理解，你开始意识到，真正的力量往往藏在沉默和有分量的决策中。你正在学习如何将你那庞大的感性直觉，转化为清晰、有逻辑、有分量的行动。这个过程就像要把深海的水提炼成甘露，虽然过程需要极度的专注，但一旦说出口的话，将具有摧枯拉朽的真实感。\n\n建议近期练习“深度倾听”。不要急于给出建议，只是作为一面镜子去接纳对方发出的信号。你会发现，当你不再急于“输出”时，那些真正解决问题的智慧会自动流入。你可以尝试开始进行一些基于文字的记录。你会发现，当你回归静谧，整个世界都会在你的笔尖下变得有序。信任你的这种直感，它是你在这个变动时代中最好的罗盘。",
                m: "你是被拣选的“真相传声筒”。你的使命是通过精准的表达，去戳破周围那些虚伪的泡沫。你的存在就是为了重申真实。通过你的作品或言谈，你将建立一种基于诚信的新标准，引导迷茫的人找到属于自己的北极星。你的每一句话都是这个时代的坐标点，能让焦虑的灵魂找到归处。",
                s: "目前的指引在于言语的“提纯”。当你说得越少，你的每一句话就越重。练习深度倾听，听取内心的细语。在接下来的周期里，不要急于发表观点或自证清白，先让智慧在内心沉淀成琥珀。当你的内在完全澄清时，你的声音将拥有穿透时空的力量。记住，最伟大的教导往往是在沉默中完成的，你的气场本身就是教导。信任这份力量。"
            }
        ];

        // 补全 16 种原型 (大白话/三段式/500字)
        const FINAL_LIBRARY = (() => {
            const lib = [...ARCHETYPE_SEED];
            const names = ["日冕纯金", "流金琥珀", "碧玺孔雀", "熔岩赤红", "靛蓝星空", "晶钻透明", "大地守望", "银河核心", "雷姆利亚", "恒星辉光", "亚特兰蒂斯", "仙女座白", "宇宙太极"];
            const colors = ["#FACC15", "#F97316", "#14B8A6", "#EF4444", "#6366F1", "#FFFFFF", "#78350f", "#e2e8f0", "#5eead4", "#fafaf9", "#312e81", "#cbd5e1", "#4b5563"];
            const labels = ["实相显化者", "激情创造者", "稳健守护人", "行动开拓者", "灵魂译码员", "神圣见证人", "定海神针", "业力结算师", "水性疗愈者", "神圣执行官", "能量工程师", "中立平衡者", "寂静守夜人"];
            
            for(let i=0; i<names.length; i++) {
                lib.push({
                    n: names[i], c: colors[i], l: labels[i], w: [i % 7, (i+3) % 7],
                    a: `扫描结果显示你目前正被${names[i]}光场包裹。这反映出你正处在一个非常关键的“生活节奏调整期”。你最近是否感到一种说不出的疲惫？仿佛每天都在忙碌，但内心却找不到真正的着力点。这种感觉并不是因为你懒惰，而是因为你的内在频率正在拒绝那些让你感到“内耗”的事情，比如那些勉强的社交、毫无意义的攀比，或者是职场中让你心累的人际拉扯。\n\n从更深层的角度来看，这其实是一个“找回自我主权”的过程。你可能习惯了扮演一个“好人”，习惯了去满足他人期待，却唯独忽略了自己那个最真实的呼声。这种频率的出现，是在提醒你：是时候把关注点从外面撤回来了。你正在学习如何设定边界，如何对自己不想做的事情说“不”，这虽然会让你在短期内感到不安，但却是通往内心自由的必经之路。\n\n在接下来的周期里，建议你允许自己有一段“精神休整期”。不要急着去达成什么伟大的目标，尝试去接受那个偶尔会焦虑、会疲惫的自己。当你不再跟自己较劲，当你开始真正接纳当下的每一个瞬间时，那种久违的轻松感就会回来。你会发现，当你不再紧紧抓着一切不放，那些真正属于你的资源，反而会顺着这种轻松的频率，悄悄地来到你的身边。你已经是光，只需允许自己照耀。`,
                    m: `你这一生的灵魂核心代码是“${labels[i]}”。你的天赋使命其实是通过你最真实的生活状态，去影响和照亮你周围的人。你不需要成为一个伟大的领袖，你只需要在每一个平凡的瞬间，坚持做那个真实的、不伪装的自己。这种真实产生的力量是巨大的，它能让周围那些同样感到焦虑和迷茫的灵魂，看到一种活出自我、找回平静的可能性。你正在学习如何在复杂的红尘中守住那颗纯净的心。`,
                    s: `源头给你的指引是：学会“放手”的艺术。你太习惯于掌控生活中的每一个细节，这让你感到非常疲惫。但现在的重点是学会信任生活的自然流向。当你不再因为结果而焦虑，当你不再纠结过去或者是担忧未来时，你当下的状态就是最具显化力量的。建议你近期尝试每天进行十分钟的静坐。当你回归到内心的极致寂静中，你会发现，所有的问题其实都已经有了答案。信任这种节奏。`
                });
            }
            return lib;
        })();

        // --- 3. UI 主框架 ---

        function StarField() {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                const stars = Array.from({ length: 140 }, () => ({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 1.5, speed: Math.random() * 0.1 + 0.05 }));
                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); s.y -= s.speed; if (s.y < 0) s.y = canvas.height; });
                    frameId = requestAnimationFrame(draw);
                };
                window.addEventListener('resize', resize); resize(); draw();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(frameId); };
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0" />;
        }

        function App() {
            const [input, setInput] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [result, setResult] = useState(null);
            const [showShareModal, setShowShareModal] = useState(false);
            const [posterUrl, setPosterUrl] = useState('');
            const posterRef = useRef(null);

            const displayTags = useMemo(() => [...TAG_POOL].sort(() => 0.5 - Math.random()).slice(0, 7), []);

            const performScan = (forcedInput) => {
                const finalInput = forcedInput || input;
                if (!finalInput.trim()) return;
                setIsScanning(true);
                setResult(null);
                setTimeout(() => {
                    const charCodeSum = Array.from(finalInput).reduce((sum, char) => sum + char.charCodeAt(0), 0);
                    const arch = FINAL_LIBRARY[charCodeSum % FINAL_LIBRARY.length];
                    
                    const rands = Array.from({length: 7}, () => Math.floor(Math.random() * 20) + 48);
                    if (arch.w) arch.w.forEach(idx => rands[idx] += 30);

                    const map = {
                        "海底轮": { h: "根基极稳。建议：将这份安全感转化为向上的显化动力。", l: "地基暂虚。建议：多赤脚接触大地清理匮乏感。" },
                        "生殖轮": { h: "创造力巅峰。建议：享受生命喜悦进行感性创作。", l: "生命力凝滞。建议：随心舞动激活内在源泉。" },
                        "太阳神经丛": { h: "意志力极强。建议：练习平衡掌控欲顺应神圣节奏。", l: "意志重塑期。建议：对着镜子练习肯定句确认主权。" },
                        "心轮": { h: "慈悲满溢。建议：建立健康边界防止过度共情。", l: "心门微闭。建议：尝试心之呼吸允许爱进入伤口。" },
                        "喉轮": { h: "言语有权柄。建议：只说带有建设性的真理之言。", l: "表达受阻。建议：通过自由书写将声音流淌。" },
                        "眉心轮": { h: "直觉极敏锐。建议：信任第一灵感那是高我在对话。", l: "感知迷雾。建议：多看远山协助视觉意识校准频率。" },
                        "顶轮": { h: "神圣连接。建议：保持静默作为源头翻译器。", l: "逻辑局限。建议：多读高频书籍打破认知天花板。" }
                    };

                    setResult({
                        aura: { color: arch.c, name: arch.n + "光", summary: `正在经历“${arch.l}”阶段的深度校准` },
                        a: arch.a,
                        mission: arch.m,
                        advice: arch.s,
                        chakras: CHAKRA_NAMES.map((n, idx) => {
                            const val = Math.min(rands[idx], 99);
                            return { name: n, value: val, status: `判定：${val > 75 ? '流转顺畅' : '需重点调频'}。${map[n][val > 75 ? 'h' : 'l']}` };
                        })
                    });
                    setIsScanning(false);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 2800); 
            };

            const generatePoster = async () => {
                setShowShareModal(true);
                setTimeout(async () => {
                    if (posterRef.current) {
                        try {
                            const canvas = await html2canvas(posterRef.current, {
                                backgroundColor: "#010103",
                                scale: 2,
                                useCORS: true,
                                logging: false
                            });
                            setPosterUrl(canvas.toDataURL("image/png"));
                        } catch (e) { console.error(e); }
                    }
                }, 800);
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden bg-void">
                    <StarField />
                    <div className="relative z-10 max-w-2xl mx-auto px-6 py-12 flex flex-col items-center">
                        {!result && !isScanning && (
                            <div className="w-full flex flex-col items-center animate-in">
                                <header className="text-center mb-12 space-y-6">
                                    <div className="relative inline-block mb-4">
                                        <div className="absolute inset-0 bg-indigo-500/20 blur-[60px] rounded-full animate-pulse" />
                                        <div className="relative p-7 rounded-full border border-indigo-500/20 bg-black/60 shadow-2xl">
                                            <Icon name="Sparkles" className="w-14 h-14 text-indigo-300" />
                                        </div>
                                    </div>
                                    <h1 className="text-5xl font-extralight tracking-[0.4em] mb-4 text-white">宇宙能量扫描站</h1>
                                    <p className="text-[10px] tracking-[0.6em] text-indigo-400 font-bold mb-10 opacity-50 uppercase">Real-Time Frequency Decoder</p>
                                    
                                    <div className="principle-box rounded-[2.5rem] p-10 mb-10 max-w-sm mx-auto shadow-2xl">
                                        <p className="text-[17px] principle-text italic text-center">
                                            “这一刻，宇宙正通过你的意识频率与源头进行实时链接，为您解码此刻的能量指纹。”
                                        </p>
                                    </div>
                                </header>
                                
                                <div className="w-full space-y-12">
                                    <div className="space-y-6 text-center">
                                        <p className="text-sm tracking-[0.3em] text-slate-500 uppercase font-black italic">点击按钮 共振此刻诉求</p>
                                        <div className="flex flex-wrap justify-center gap-3 px-4">
                                            {displayTags.map(tag => (
                                                <button key={tag} onClick={() => performScan(tag)} className="px-6 py-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-indigo-500/30 transition-all text-xs tracking-widest text-white active:scale-95 shadow-xl">#{tag}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => performScan(ORACLES[Math.floor(Math.random() * ORACLES.length)])} className="w-full py-8 rounded-[2rem] bg-gradient-to-r from-indigo-800/80 to-purple-800/80 border border-white/20 flex items-center justify-center gap-4 group active:scale-95 transition-all shadow-2xl"><Icon name="Wand" className="w-8 h-8 text-indigo-100" /><span className="text-xl font-light tracking-[0.3em] text-white">开启能量链接</span></button>
                                    <div className="relative group pt-4">
                                        <textarea value={input} onChange={(e) => setInput(e.target.value)} placeholder="或在此输入您灵魂深处的声音..." className="w-full h-32 bg-transparent border-b border-white/10 p-4 focus:outline-none focus:border-indigo-400 transition-all resize-none text-center text-xl font-light text-white" />
                                        {input && (<button onClick={() => performScan()} className="absolute bottom-4 right-4 p-4 bg-white text-black rounded-full hover:scale-110 transition-transform shadow-2xl"><Icon name="Zap" className="w-6 h-6" /></button>)}
                                    </div>
                                </div>
                            </div>
                        )}

                        {isScanning && (
                            <div className="flex flex-col items-center justify-center py-48 space-y-12 w-full animate-in">
                                <div className="relative animate-float"><div className="w-64 h-64 border border-indigo-500/10 rounded-full animate-[ping_4s_infinite]" /><div className="absolute inset-0 flex items-center justify-center"><div className="w-32 h-32 border-t-2 border-indigo-400 rounded-full animate-spin" /></div></div>
                                <p className="text-2xl tracking-[0.6em] text-white font-black animate-pulse text-center">正在解析此刻能量指纹...</p>
                            </div>
                        )}

                        {result && (
                            <div className="w-full space-y-24 animate-in pb-32">
                                <section className="relative p-10 rounded-[3rem] border border-white/10 bg-black/40 shadow-2xl overflow-hidden">
                                    <div className="absolute -right-32 -top-32 w-[500px] h-[500px] blur-[150px] opacity-25" style={{ backgroundColor: result.aura.color }} />
                                    <div className="relative space-y-10">
                                        <div className="space-y-6 text-center sm:text-left">
                                            <h2 className="text-[10px] uppercase tracking-[0.6em] text-indigo-400 font-black">能量场报告 / Aura Analysis</h2>
                                            <div className="flex flex-col sm:flex-row items-center gap-6">
                                                <span className="text-5xl font-light text-white tracking-[0.2em]">{result.aura.name}</span>
                                                <div className="w-10 h-10 rounded-full shadow-lg" style={{ backgroundColor: result.aura.color, boxShadow: `0 0 35px ${result.aura.color}` }} />
                                            </div>
                                            <p className="text-indigo-200/60 tracking-[0.15em] text-lg font-bold italic italic opacity-70">“{result.aura.summary}”</p>
                                        </div>
                                        <div className="space-y-10 pt-10 border-t border-white/10">
                                            <h3 className="text-xs uppercase tracking-[0.4em] text-slate-500 flex items-center gap-4 font-black"><Icon name="Book" className="w-5 h-5" /> 深度扫描解析</h3>
                                            <div className="space-y-8">
                                                {result.a.split('\n\n').map((p, idx) => (
                                                    <p key={idx} className="text-slate-100 text-lg leading-loose font-light tracking-wide text-indent">{p}</p>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section className="py-12 flex flex-col items-center space-y-16">
                                    <div className="text-center space-y-4"><h3 className="text-lg uppercase tracking-[0.6em] text-indigo-400 font-black">能量中心系统</h3><p className="text-[10px] text-slate-600 tracking-widest uppercase text-center italic opacity-40">Spiritual Alignment Mapping</p></div>
                                    <div className="w-full flex justify-center bg-black/20 py-20 rounded-[5rem] border border-white/5 relative overflow-hidden group shadow-inner">
                                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-indigo-500/5 to-transparent opacity-40" />
                                        <MeditatingFigureSVG />
                                    </div>
                                </section>

                                <section className="p-10 rounded-[3.5rem] border border-white/10 bg-black/20 shadow-xl">
                                    <h3 className="text-xs uppercase tracking-[0.6em] text-indigo-400 font-black mb-16 flex items-center gap-4"><Icon name="Anchor" className="w-6 h-6" /> 七脉轮能量洞察</h3>
                                    <div className="space-y-20">
                                        {result.chakras.map((c, i) => (
                                            <div key={c.name} className="group border-l-2 border-white/10 pl-8 transition-all hover:border-indigo-500/40">
                                                <div className="flex justify-between items-end mb-4">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-3 h-3 rounded-full shadow-lg" style={{ backgroundColor: CHAKRA_COLORS[i] }} />
                                                        <span className="text-2xl tracking-[0.2em] text-white font-medium">{c.name}</span>
                                                    </div>
                                                    <span className="text-sm text-indigo-400 font-mono font-black">{c.value}%</span>
                                                </div>
                                                <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden mb-6"><div className="h-full transition-all duration-[3500ms]" style={{ width: `${c.value}%`, backgroundColor: CHAKRA_COLORS[i] }} /></div>
                                                <p className="text-[15px] leading-relaxed text-slate-300 font-light italic">{c.status}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="grid grid-cols-1 gap-12">
                                    <div className="p-12 rounded-[3.5rem] border border-indigo-500/20 bg-indigo-900/10 shadow-2xl">
                                        <h4 className="text-xs uppercase tracking-[0.6em] text-indigo-400 font-black mb-10 flex items-center gap-4"><Icon name="Eye" className="w-6 h-6" /> 天赋使命感应</h4>
                                        <p className="text-slate-100 text-xl font-light leading-relaxed tracking-wide text-indent">{result.mission}</p>
                                    </div>
                                    <div className="p-12 rounded-[3.5rem] border border-yellow-500/20 bg-yellow-900/10 shadow-2xl">
                                        <h4 className="text-xs uppercase tracking-[0.6em] text-yellow-500/70 font-black mb-10 flex items-center gap-4"><Icon name="Heart" className="w-6 h-6" /> 源头智慧建议</h4>
                                        <p className="text-slate-100 text-xl font-light leading-relaxed tracking-wide text-indent">{result.advice}</p>
                                    </div>
                                </section>

                                <div className="space-y-8 pt-12 text-center">
                                    <div className="grid grid-cols-2 gap-6">
                                        <button onClick={generatePoster} className="py-8 rounded-[2rem] bg-indigo-500 text-white font-black text-sm tracking-[0.5em] uppercase flex items-center justify-center gap-4 hover:bg-indigo-400 transition-all shadow-xl active:scale-95 animate-bounce">生成分享海报</button>
                                        <button onClick={() => { setResult(null); setInput(''); window.scrollTo({top: 0, behavior: 'smooth'}); }} className="py-8 rounded-[2rem] border border-white/10 text-xs tracking-[1em] uppercase text-slate-600 hover:text-slate-400 transition-all font-black">重新校准</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 海报截图容器 (屏外渲染) */}
                    {result && (
                        <div ref={posterRef} className="poster-canvas-area p-10 text-white">
                            <div className="text-center mb-10 border-b border-white/10 pb-8">
                                <Icon name="Sparkles" className="w-16 h-16 text-indigo-400 mx-auto mb-6" />
                                <h2 className="text-3xl font-black tracking-[0.2em] uppercase mb-4">宇宙能量报告</h2>
                                <p className="text-xs text-indigo-400 opacity-60 tracking-widest italic font-bold">NENGLIANG.SITE</p>
                            </div>
                            <div className="flex items-center gap-6 mb-10 justify-center">
                                <div className="w-8 h-8 rounded-full shadow-2xl" style={{ backgroundColor: result.aura.color }} />
                                <span className="text-5xl font-light tracking-[0.1em]">{result.aura.name}</span>
                            </div>
                            <div className="bg-white/5 p-10 rounded-[2.5rem] mb-12 border border-white/10">
                                <p className="text-xs text-indigo-400 uppercase font-black mb-6 tracking-widest">天赋使命 / MISSION</p>
                                <p className="text-slate-100 text-[14px] leading-relaxed line-clamp-custom">{result.mission}</p>
                            </div>
                            <div className="flex items-center justify-between gap-10 px-8 py-10 border-t border-white/10 bg-white/[0.02]">
                                <div className="text-left space-y-3">
                                    <p className="text-lg font-black tracking-widest text-white">扫码解码能量</p>
                                    <p className="text-xs text-slate-500 italic font-bold">开启您的 2026 觉醒之旅</p>
                                </div>
                                <QRCodeGenerator url={window.location.origin} />
                            </div>
                        </div>
                    )}

                    {/* Share Modal */}
                    {showShareModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-in">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl" onClick={() => { setShowShareModal(false); setPosterUrl(''); }} />
                            <div className="relative w-full max-w-sm flex flex-col items-center">
                                <button onClick={() => { setShowShareModal(false); setPosterUrl(''); }} className="absolute -top-14 right-0 p-4 bg-white/10 rounded-full text-white border border-white/20 shadow-2xl z-[110] flex items-center justify-center"><Icon name="X" className="w-8 h-8" /></button>
                                {posterUrl ? (
                                    <div className="w-full flex flex-col items-center animate-in">
                                        <img src={posterUrl} className="w-full rounded-[3rem] shadow-2xl border border-white/20" alt="宇宙能量海报" />
                                        <div className="mt-10 px-10 py-4 bg-indigo-500/30 border border-indigo-500/40 rounded-full animate-pulse shadow-2xl">
                                            <p className="text-indigo-100 text-base font-black tracking-widest text-center">长按保存图片并分享</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="py-32 text-center bg-black/60 rounded-[3rem] w-full border border-white/10">
                                        <div className="w-16 h-16 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin mx-auto mb-8" />
                                        <p className="text-indigo-300 animate-pulse font-bold tracking-widest text-center">正在绘制专属海报...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        if (container) {
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }
    </script>
</body>
</html>
